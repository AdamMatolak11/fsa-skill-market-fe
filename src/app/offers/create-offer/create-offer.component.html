<div class="create-offer-section">
  @if (success) {
    <div class="alert alert-success alert-dismissible fade show">
      {{ success }}
      <button type="button" class="btn-close" (click)="success = null"></button>
    </div>
  }

  @if (!showForm) {
    @if (canSubmitOffer()) {
      <button class="btn btn-primary" (click)="openOfferForm()">
        Submit Your Offer
      </button>
    }
  } @else {
    <div class="card mt-3">
      <div class="card-header">
        <h5 class="mb-0">Submit Offer for Project</h5>
      </div>
      <div class="card-body">
        @if (error) {
          <div class="alert alert-danger">{{ error }}</div>
        }

        <div class="mb-3">
          <label class="form-label"><strong>Your Bid Amount (€)</strong></label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="formData.amount"
            placeholder="0.00"
            step="0.01"
            min="0.01"
          />
        </div>

        <div class="mb-3">
          <label class="form-label"><strong>Your Message/Proposal</strong></label>
          <textarea
            class="form-control"
            rows="4"
            [(ngModel)]="formData.message"
            placeholder="Tell the client why you're a great fit for this project..."
          ></textarea>
        </div>

        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
          <button
            type="button"
            class="btn btn-secondary"
            (click)="closeForm()"
            [disabled]="loading"
          >
            Cancel
          </button>
          <button
            type="button"
            class="btn btn-primary"
            (click)="submitOffer()"
            [disabled]="loading || !formData.amount || !formData.message.trim()"
          >
            @if (loading) {
              <span class="spinner-border spinner-border-sm me-2"></span>
            }
            Submit Offer
          </button>
        </div>
      </div>
    </div>
  }
</div>
