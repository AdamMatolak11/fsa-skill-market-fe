<div class="project-detail-container">
  <div class="back-button-container mb-4">
    <button class="btn btn-outline-secondary" (click)="goBack()">
      <i class="bi bi-arrow-left"></i> Back to List
    </button>
  </div>

  <div class="card" *ngIf="project">
    <div class="card-header bg-primary text-white">
      <h2 class="mb-0">{{ project.title }}</h2>
    </div>
    <div class="card-body">
      <div class="row mb-4">
        <div class="col-md-6">
          <h5 class="text-muted">Description</h5>
          <p class="lead">{{ project.description }}</p>
        </div>
        <div class="col-md-6">
          <div class="row">
            <div class="col-12 mb-3">
              <h5 class="text-muted">Budget</h5>
              <p class="lead text-success fw-bold">€{{ project.budget.toFixed(2) }}</p>
            </div>
            <div class="col-12 mb-3">
              <h5 class="text-muted">Status</h5>
              <span class="badge fs-6" [ngClass]="getStatusBadgeClass(project.status)">
                {{ project.status }}
              </span>
            </div>
            <div class="col-12">
              <h5 class="text-muted">Created</h5>
              <p class="mb-0">{{ formatDate(project.createdAt) }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
